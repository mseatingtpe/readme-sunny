name: Update README

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00（台灣 09:00）
  workflow_dispatch:  # 手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch new Substack articles
        run: python scripts/fetch_substack.py

      - name: Check for new content
        id: check
        run: |
          if git diff --quiet content/raw/; then
            echo "new_content=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_content=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract worldview dimensions
        if: steps.check.outputs.new_content == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/extract.py --all

      - name: Generate Skill (update dynamics only)
        if: steps.check.outputs.new_content == 'true'
        run: python scripts/generate_skill.py --update-dynamics

      - name: Generate README
        run: python scripts/generate_readme.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "auto: update content and README"
            git push
          fi
