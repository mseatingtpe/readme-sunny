name: Update Content & Skill

on:
  schedule:
    # 每天早上 9 點 (UTC+8) = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      force_extract:
        description: '強制重新萃取所有文章'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch new Substack articles
        run: python scripts/fetch_substack.py

      - name: Check for new content
        id: check
        run: |
          if git diff --quiet content/raw/; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract worldview dimensions
        if: steps.check.outputs.has_new == 'true' || github.event.inputs.force_extract == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force_extract }}" = "true" ]; then
            python scripts/extract.py --all --force
          else
            # Only extract new files (those without existing extractions)
            python scripts/extract.py --all
          fi

      - name: Generate Skill
        if: steps.check.outputs.has_new == 'true' || github.event.inputs.force_extract == 'true'
        run: python scripts/generate_skill.py --auto

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ .claude/skills/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update content and skill $(date +%Y-%m-%d)"
            git push
          fi
