<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root { --text: #1a1a1a; --bg: #fafafa; --accent: #444; --muted: #888; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Noto Sans TC", "Helvetica Neue", sans-serif; color: var(--text); background: var(--bg); line-height: 1.8; max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.3rem; margin: 2rem 0 0.5rem; border-bottom: 1px solid #ddd; padding-bottom: 0.3rem; }
    h3 { font-size: 1.1rem; margin: 1.5rem 0 0.3rem; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid #ccc; }
    a:hover { border-color: var(--accent); }
    nav { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #ddd; }
    nav a { margin-right: 1.5rem; border: none; }
    .date { color: var(--muted); font-size: 0.9rem; }
    .tag { display: inline-block; background: #eee; padding: 0.1rem 0.5rem; border-radius: 3px; font-size: 0.8rem; margin-right: 0.3rem; }
    .entry { margin-bottom: 1.5rem; }
    blockquote { border-left: 3px solid #ddd; padding-left: 1rem; color: var(--muted); margin: 1rem 0; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #ddd; color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/">首頁</a>
    <a href="/content/">文章</a>
    <a href="/media/">媒體</a>
    <a href="/worldview/">世界觀</a>
  </nav>
  {{ content }}
  <footer>
    Sunny's README — perpetual beta
  </footer>
</body>
</html>
