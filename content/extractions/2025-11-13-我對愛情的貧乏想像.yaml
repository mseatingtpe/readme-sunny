source: content/raw/2025-11-13-我對愛情的貧乏想像.md
timestamp: '2025-11-13'
topics:
- name: 工作
  stance: 資本與交易的本質讓她痛苦，自認尚未有充分資格代表股東使用資本，緩慢建構系統是因為做不出重大決策。
  tension: 梳理能力被外界肯定，但午夜夢迴時認為那是膽怯的藉口
  shift_signal: null
  key_quote: 我甘願擔任市儈的角色，只是對於標價我感到痛苦。
- name: 身份
  stance: 不具備創作天賦也不願下苦工，甘願作為藝術家周邊的人，渴望透過服務藝術家進入幻象。
  tension: 想活在藝術的國度，卻必須持續談論錢，兩種角色的拉扯
  shift_signal: 十年前讀《生活是甜蜜》關注藝術家面對窮盡的創作，現在最共感的是藝術家周邊的人的段落。
  key_quote: 用盡力氣想要活在藝術的國度，只是徒然。他們並非神選之人，只好靠近神選之人。
- name: AI
  stance: 將 LLM 用於易經卜卦等非典型用途，相信只要相信，賽博卜卦就有意義；Attention Is All You Need 的互文讓她得出「愛就是注意力所及之處」。
  tension: null
  shift_signal: null
  key_quote: 愛就是注意力所及之處。
- name: 愛
  stance: 對愛情的想像不是佔有或條件清單，而是理解人的複雜性、允許差異、願意一起想像更好的未來；世界上最該愛的是自己。
  tension: 寫完理想關係清單後哭了一場，對愛情的想像被自己稱為「貧乏」，與月老許願式的條件列舉對立
  shift_signal: 少女時期讀傲慢與偏見覺得是霸道莊主愛上我，此時此刻讀只能臣服於珍奧斯汀的鋒利。
  key_quote: 也許世界上我最該愛的就是自己。
connections:
- Attention Is All You Need 論文標題來自披頭四 All You Need Is Love，串連 AI 技術與愛的本質
- 易經卜卦、擲筊與 LLM 都是解讀象徵意義的編程
- 李維菁描述的藝術家周邊角色對應自身在資本與創作之間的位置
