topics:
- name: 文化
  stance: 女性主義不是帶來解法的立場宣告，而是一個濾鏡——用五個問題檢視內容，但這個濾鏡可能只會帶來更多無法解答的問題。
  tension: 與期待講者帶來堅定立場和解法的期待對立；也與喬治卡林「沒有什麼不能說」的喜劇主張形成張力。
  shift_signal: 從原本想講「跟性有關的笑話」轉向講「性別議題」。
  key_quote: 濾鏡確實，可能只會帶來更多無法解答的問題。
- name: AI
  stance: AI 可以幫忙「尋回認知」，但拓展認知仍是個人的學習；就算有 AI，讀的書不會變少。
  tension: 與「AI 可以取代學習」的觀點對立——要先能想像魔法才能施展魔法。
  shift_signal: null
  key_quote: 要先能想像魔法才能施展魔法喔。
- name: 工作
  stance: 真正的問題一直都不是 AI，而是協作；組織變革的 dirty work 比英雄故事重要，放著讓問題發酵反而會萌生解法。
  tension: 與追求工具技術進步的期待對立——作者更關注場域問題的理解與協作設計。
  shift_signal: 從去年的冒牌者情節，到今年被寄託「啟發了好多人」的包袱。
  key_quote: 但真正的問題，一直都不是 AI ，而是協作啊！
- name: 身份
  stance: 擅長想像失敗是一種積極的悲觀——事情結果總比想像中好，身體記憶累積的是「再怎麼樣都會比想像中好」。
  tension: 與「顯化」正向思考的流行觀點對立。
  shift_signal: null
  key_quote: 壞處是，事情都沒有發生我就內耗完了；好處是，事情結果總比我想像中好。
