source: content/raw/2025-07-22-比絕望先一步抵達愛-ai.md
timestamp: '2025-07-22'
topics:
- name: AI
  stance: 工具流暢本身很迷人，但刻意不著迷於工具——書寫是手工，寫出來才是自己的；AI 沒有縮短太多學習時間，比較像是逼自己面對從前沒讀好的書。
  tension: 與 AI 加速學習的主流敘事對立——如果不透過手工摘要，知識仍然模糊。
  shift_signal: 從三個月前在 Readwise Reader 一字一字讀，到現在用多種工具分層閱讀，但最終仍認為手寫才能內化。
  key_quote: 寫出來才是我的。
- name: 學習
  stance: 學習如何學習是持續演化的——要建立流動的機制、劃出安全感結界、用不同介質理解和表達、保持好奇心永遠懷疑。
  tension: 與囤積知識的心態對立——知識很快就會過期，重點是流動而非囤積。
  shift_signal: 意識到「主動聆聽」和「即時思考」能力因依賴 AI 逐字稿而下降，開始改為先記下感受再用 AI 補充。
  key_quote: 對話是絕佳的學習介面，但如果不是回應由我自己的好奇心出發的疑問，那連綿的 AI 詞元與我並沒有關係。
- name: 文化
  stance: 用不同語言理解同一個主題會產生截然不同的結果，單一語言搜尋會困在單一視野中。
  tension: null
  shift_signal: 被慕約「用日文搜尋」的案例醍醐灌頂，發現自己從未思考過語言本身就是壁壘。
  key_quote: 用不同的語言理解同一個主題，會產生截然不同的結果。因為當我們只有一種語言搜尋，就會困在單一語言的視野當中。
connections:
- 齊澤克的哲學文章作為 AI 輔助閱讀的測試案例
- Heptabase、Readwise Reader、NotebookLM 三種工具對應不同的閱讀深度
- 知識流動如同六字大明咒——最直接的智慧不需要轉譯
- 手機使用場景（刷牙、搭公車）中 Gemini 的自然整合
keywords:
