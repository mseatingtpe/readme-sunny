source: content/raw/2025-04-22-work-life-harmony.md
timestamp: '2025-04-22'
topics:
- name: 工作
  stance: 工作是參與創製世界的其中一種手段，不是生活的對立面；工作與生活不是零和遊戲，能量來源包含成就感、達成共同目標、獨創的體驗。
  tension: 在乎員工情緒是否真的能讓公司賺更多錢——功利計算 vs. 文化信念的不確定性。
  shift_signal: 去年下半年 burnout，不談工作的自己是不是個無聊的人？聖誕節半夜看 MBA 簡章，隱約覺得不是自己要的。
  key_quote: 我認為工作是參與創製世界的其中一種手段
- name: AI
  stance: AI 可以輔助創作，但靈光乍現的時刻希望自己是自己的；人和 AI 的關係是 pair writing，不傾向把 AI 當奴隸。
  tension: AI 已經能處理大部分翻譯，為什麼還要上英文學術寫作——能力的自我懷疑 vs. 對語言掌控的渴望。
  shift_signal: null
  key_quote: 靈光乍現的時刻，我喜歡我是我的我。
- name: 學習
  stance: 用不熟悉的語言寫作像持續的實境解謎遊戲，痛苦但快樂；渴望受到完整的學術和思考訓練。
  tension: 沒有 hardskills 使人痛苦 vs. 學習過程中被改得滿江紅的自虐式快感。
  shift_signal: null
  key_quote: 用不熟悉的語言寫作的方式，像是持續的實境解謎遊戲，必須調度所有的認知，在字裡行間排列組合。
- name: 身份
  stance: 幫助別人成就夢想也可以是夢想；沒有夢想不代表沒有方向，待得夠久就能從旅程中找到戰鬥位置。
  tension: 沒有夢想的焦慮 vs. 因緣際會中慢慢長出的定位。
  shift_signal: 24 歲創業時不懂的就去學，現在超出大學四年的時間在同一場域耕耘。
  key_quote: 幫助別人成就他們的夢想也可以是夢想啊～
connections:
- 紀錄片《Time to Work》的制度設計連結到薩泰爾的文化實踐——職場文化需要經過設計再有機長成
- 朋友 Stan 的空間規劃專業連結到工作作為濾鏡——專業語彙讓人看見別人看不到的東西
- 英文寫作的「出個對子對死他」連結到 free writing——兩種截然不同的語言流動方式
- yutori 的「你是什麼宅」招募條件連結到 Work-Life Harmony——熱情與工作的整合
