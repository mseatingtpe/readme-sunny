source: content/raw/2024-11-26-從合約產生器完成到現在差不多一年.md
timestamp: '2024-11-26'
topics:
- name: 工作
  stance: 數位轉型是髒活，價值難以量化但真實存在，管理是增益技能無法獨立存在，要在髒活中辯證哪些是創意哪些是洗碗劑。
  tension: 與認為管理後台工作沒有價值、「不然請助理是要幹嘛」的觀點對立。
  shift_signal: 從認為自動化「能有多難」到體會每個卡住的結點都是尚未理解的知識。
  key_quote: 原來所有卡住的結點，都是我尚未徹底理解的知識。在理性的範疇裡，不應存在語焉不詳的物件。模糊不是性質，是既有的框架出了差錯。
- name: AI
  stance: 為了自動化必須讓所有模糊的知識百分之百現形，AI 時代這些重複性工作即將消失，對此感到雀躍。
  tension: 與對 AI 取代工作感到恐懼的態度對立。
  shift_signal: 為這樣的工作即將消失感到雀躍，同時好奇將來的學習場景。
  key_quote: 此後幾年，我為這樣的工作即將消失感到雀躍不已，同時也為將來的學習場景感到相當好奇。
- name: 學習
  stance: 沒學好的細節都會變成鬼，自動化的過程就是逼自己面對所有未徹底理解的知識，學習軌跡無法逃避。
  tension: null
  shift_signal: null
  key_quote: 沒學好的細節都會變成鬼。為了要自動化，這些鬼要 100% 現形。
connections:
