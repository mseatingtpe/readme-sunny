stance: "數位轉型的核心是髒活，把人做的事轉化成機器做的事需要徹底理解每一個細節，模糊不是性質而是框架出了差錯。管理是增益技能，無法獨立存在。"
tension: "外界認為這些行政自動化只是請助理或法務會計就好的工作，作者認為其中有深層價值但仍在思考如何衡量。"
connections:
