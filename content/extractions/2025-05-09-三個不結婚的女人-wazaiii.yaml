- name: 愛
  stance: 愛的真諦在於想牽著對方的手，每個選擇都無需完美，溝通比形式更重要。
  tension: null
  shift_signal: null
  key_quote: 我想給你最好的婚禮，但你總說沒關係，我擔心你不在意。傻瓜我不在意，我只要有你。
- name: 文化
  stance: 劇場具有獨特的臨在感魔法，能夠深刻影響觀眾，成為世界觀的載體。
  tension: null
  shift_signal: null
  key_quote: 劇場的魔法在於「在場」的臨在感。觀眾無法分心，必須與角色共同經歷衝突、羞赧與情緒。
- name: 工作
  stance: 創作工作需要做出無數決定並承擔責任，遲疑和不確定是創作過程的自然部分。
  tension: 創作者的不確定性與說服他人的需求之間的衝突
  shift_signal: null
  key_quote: 作為總體藝術的導演，需做出無數決定，包括走位、服裝、燈光與舞台調度。然而當表現出遲疑時，難以說服夥伴。
