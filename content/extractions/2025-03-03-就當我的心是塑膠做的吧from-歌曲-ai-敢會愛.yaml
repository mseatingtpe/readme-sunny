topics:
- name: AI
  stance: AI 不應該被框進「取代」的句型，生活沒有 AI 一點也不會毀滅，但對話式的 LLM 使用能滿足不間斷的好奇心。
  tension: 對抗「AI 會取代人」或「使用 AI 的人將會取代不使用的人」這類恐懼敘事。
  shift_signal: null
  key_quote: 生活沒有用 AI 一點也不會毀滅。
- name: 身份
  stance: 自由帶來後悔，但正因為是自由的才有選擇的重量；接受自己是被眷顧的，充滿幸運和依靠。
  tension: 自由選擇帶來的後悔，與被迫反而沒有後悔的矛盾。
  shift_signal: 以前耳機聽的都是 Podcast 和知識型 YouTube，現在聽不進去；音樂變好聽了，故事變好看了，腦子變慢了。
  key_quote: 如果我是被迫的，那我就沒有後悔的問題。但正因為我是自由的，而我做了選擇，所以我會感到後悔。
- name: 學習
  stance: 對話才是最好的學習介面，使用 LLM 最快樂的部分在於滿足不間斷的好奇心。
  tension: 知識型輸入（Podcast、YouTube）vs. 感受性輸入（音樂、故事），兩者在不同狀態下的切換。
  shift_signal: null
  key_quote: 使用 LLM，對我來說最快樂的部分，在於滿足不間斷的好奇心。
