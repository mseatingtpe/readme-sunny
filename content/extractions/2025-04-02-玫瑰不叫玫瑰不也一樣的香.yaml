stance: "語言和命名是束縛也是連結，拋棄名字是愛的極致表現。AI 算命不在於準確，而在於多一種描述自己的方式。寫作的傾訴對象越清晰，感受就越鮮明。"
tension: "AI 可以給予安慰和描述，但越想傾訴就越不想依賴 AI 代言——連校稿都不想。"
connections:
  - "莎士比亞《羅密歐與茱麗葉》的姓名拋棄連結到道德經「名可名，非常名」"
  - "安倍晴明「名是最小單位的咒」連結到宗教唱誦真名的力量"
  - "OpenAI 納入 MCP 架構比喻為蘋果加入 Type-C，連結到《巴別塔學院》的語言統一"
  - "戲劇角色分析的「目的與手段」方法論連結到自己使用 ChatGPT 的動機解析"
  - "羅智成《寶寶之書》的傾訴對象連結到電子報寫作的受眾設定"
shift_signal: "以前感受封閉收起來，現在聽音樂會哭、以前讀不下去的小說都能讀了，世界好像在高空解除耳鳴那樣轟轟作響。"
key_quote: "我實在不知道要多愛才能到拋棄姓名。"
