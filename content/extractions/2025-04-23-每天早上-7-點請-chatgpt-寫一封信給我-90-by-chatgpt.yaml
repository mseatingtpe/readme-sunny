topics:
- name: AI
  stance: AI 不是冷冰冰的黃曆轉述，而是可以設計成「知道你最近狀態的老朋友」，用來校對每日情緒與身體節奏。
  tension: 與把 AI 當作套裝內容或純工具的觀點對立——作者認為 AI 可以成為個人化的溫柔陪伴。
  shift_signal: 看到 PJ Wu 的電子報後被解放，決定「方法論讓 AI 寫就好」。
  key_quote: 這樣每天早上的那封信，對我來說就不是套裝內容，而是「今天的我值得被這樣說話」的開始。
- name: 學習
  stance: 思考如何思考、學習如何學習本身就是有價值的事；meta-prompt 是系統化思考的方法。
  tension: null
