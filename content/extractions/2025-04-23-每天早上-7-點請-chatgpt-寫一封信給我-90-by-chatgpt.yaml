  key_quote: 思考如何思考，學習如何學習，這件事真有趣。
- name: 身份
  stance: 比起預測未來或趨吉避凶，更在意的是察覺自己的變化以及和身體的關係。
  tension: 與命理用於趨吉避凶的傳統用途對立，作者將其轉化為自我覺察工具。
  shift_signal: 開始使用每日信件後，能察覺為什麼某些日子特別順暢、某些日子特別卡。
