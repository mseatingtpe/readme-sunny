    stance: 重複的愛是唯一真正的愛；AI 最擅長量產超商義大利麵等級的內容，但人類創作的價值在於靈魂與被灼傷的可能。
    tension: 與『AI 生成可以取代人類創作』的觀點對立，認為當風格可被抽離運算，靈魂反而成為最稀缺的商品；AI 不會被灼傷，人會。
