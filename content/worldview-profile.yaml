  管理:
  - timestamp: '2024-09-20'
    stance: 工作的成就感來自持續學習與成長，管理者應從文化、制度、實務三個面向持續檢視並穿透，組織的氣長來自信念而非短期獲利。
    tension: 與只看短期績效或獲利的管理觀點對立，認為耐心等待和信念比賺不賺錢更重要。
    shift_signal: 開始慢慢體會到耐心等待的重要，從追求立即成果轉向重視組織信念。
    key_quote: 開始慢慢體會到耐心等待的重要，賺不賺錢是一時的，組織的氣長來自信念。
    source: content/raw/2024-09-20-工作的成就感因素分析.md
  - timestamp: '2024-10-21'
    stance: 試算表是解構資訊的第一步，生產力工具的價值在於體驗設計而非功能堆疊；信仰與宗教活動是使用者體驗設計的究極場景。
    tension: 反對為了管理工具而管理工具的做法，主張先理解目的再選擇工具。
    shift_signal: null
    key_quote: 信仰及宗教活動簡直是使用者體驗設計的究極場景，透過集體的意志，讓人進到場域就知道要完成什麼行為。
    source: content/raw/2024-10-21-我從生產力工具學會的三件事和關於信仰的雜感.md
  - timestamp: '2024-11-26'
    stance: 數位轉型的核心是髒活，把人做的事轉化成機器做的事需要徹底理解每一個細節，模糊不是性質而是框架出了差錯。管理是增益技能，無法獨立存在。
    tension: 外界認為這些行政自動化只是請助理或法務會計就好的工作，作者認為其中有深層價值但仍在思考如何衡量。
    shift_signal: 原以為合約產生器之後可以靠小聰明快速完成報帳流程轉換，一年後才體會到每一個偏離主線的學習都不可省略。
    key_quote: 原來所有卡住的結點，都是我尚未徹底理解的知識。在理性的範疇裡，不應存在語焉不詳的物件。模糊不是性質，是既有的框架出了差錯。
    source: content/raw/2024-11-26-從合約產生器完成到現在差不多一年.md
  - timestamp: '2025-03-06'
    stance: 品味是理解世界的語彙，在關係中品味共振能讓對話持續下去。管理語言和戀愛語言本質上都是在抽象的世界裡找到共同的描述方式。
    tension: 品味作為篩選機制的理性面，與渴望愛情靈藥的浪漫面之間的矛盾——浪漫派的實用主義者。
    shift_signal: 以前覺得莎士比亞就是英國八點檔，長越大越喜歡莎士比亞。
    key_quote: 我嚮往靈魂共振的時刻。
    source: content/raw/2025-03-06-桃花賊.md
  - timestamp: '2025-03-19'
    stance: 世界很難變好，但可以期待自己變好。魔法是無法靠一己之力完成、需要集體想像才能成真的事，而愛就是魔法。品味幫助我們在混亂中做出更好的選擇。
    tension: 與渴望超級英雄式簡單解決方案的心態對立；社會學視角使人痛苦，但不思考反而更危險。
    shift_signal: null
    key_quote: 只要期待自己就好，想像自己會如何在一個更好的世界生活。
    source: content/raw/2025-03-19-世界不會變好但你會.md
  - timestamp: '2025-04-22'
    stance: 工作是參與創製世界的手段，不是生活的對立面。Work-Life Harmony 意味著工作與生活不是零和遊戲，兩者都可以是能量來源也可以是消耗。
    tension: 與 Work-Life Balance 的零和框架對立；也與「AI 已經這麼強為何還要自己學」的效率主義對立——喜歡自虐式學習帶來的語言掌控感。
    shift_signal: 以前嚮往早上潛水滑雪、中午開始工作的數位遊牧，現在偏好用工作日和休息日作為區分，認知到自己需要的自由是能隨時進入心流狀態。
    key_quote: 靈光乍現的時刻，我喜歡我是我的我。
    source: content/raw/2025-04-22-work-life-harmony.md
  - timestamp: '2025-05-13'
    stance: 真正的問題不是 AI 而是協作；AI 的產出只有對人類有意義，變革要在好玩當中進行。
    tension: 與認為 AI 工具本身就是解答的觀點對立，強調場域理解和協作設計才是核心。
    shift_signal: 以前覺得自己沒資格講女性主義，準備過程中徹底整理了自己相信的價值，收穫最多的是自己。
    key_quote: AI 的產出對 AI 來說只是一坨又一坨的文字，這些文字只有對人類世界有意義，對 AI 沒有。
    source: content/raw/2025-05-13-講完女性主義跟喜劇正在準備財務的演講接著要賣-gai-年會的門票.md
  - timestamp: '2025-05-27'
    stance: 越是瘋狂強調效率的時代，越不該在教育持續分科；場域的整理與設計框架是 dirty work，但感受各種形式的流動才是創建世界的方法。
    tension: 與強調分科、效率優先、英雄敘事的觀點對立，認為跨領域的流動和感受力比性感的故事更重要。
    shift_signal: null
    key_quote: 讀小說、看漫畫、看電影、讀詩、聽音樂、派對、跳舞，感受各種形式的流動，都是創建世界的方法。
    source: content/raw/2025-05-27-be-water-but-clean-gai2025.md
  - timestamp: '2026-01-01'
    stance: 愛是一切的解答；當心被佔據時根本沒有空間留給 AI Slop，相信的本質是主動，練習 Being 而非 Doing，避免高效率地生產沒有價值的東西。
    tension: 與效率至上、AI 萬能的生產力敘事對立，認為高效率生產垃圾還是垃圾，世界獎勵的不是努力而是辨識價值。
    shift_signal: 上半年語帶保留，下半年開始放鬆；從想和誰證明，轉向純粹想搞清楚自己為什麼是自己。2025 的主題從 Doing 轉向 Being。
    key_quote: 機器可以模擬愛的連結，卻無法模擬愛的重量。
    source: content/raw/2026-01-01-相信的事情列表-2025h218-愛是一切的解答.md
